<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول | نظام إدارة المدرسة الذكي</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Cairo', sans-serif; }</style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full border border-slate-100 transition-all duration-300 hover:shadow-2xl">
        <!-- Logo / Title -->
        <div class="text-center mb-8">
            <div class="inline-flex p-3 bg-indigo-50 text-indigo-600 rounded-xl mb-3">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l9-5-9-5-9 5 9 5z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 14l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.083 12.083 0 01.665-6.479L12 14z"/></svg>
            </div>
            <h1 class="text-2xl font-bold text-slate-800">مرحباً بك في المنصة الذكية</h1>
            <p class="text-slate-500 text-sm mt-1">الرجاء تسجيل الدخول لمتابعة حسابك</p>
        </div>

        <!-- Django Form Template Hook -->
        <form method="POST" action="." class="space-y-5">
        {% csrf_token %}
            <!-- سيتم إضافة {% csrf_token %} هنا في دجانجو -->
            
            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">اسم المستخدم أو الكود</label>
                <input type="text" name="username" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-indigo-500 text-right transition-colors" placeholder="أدخل اسم المستخدم" name='username'>
            </div>

            <div>
                <label class="block text-sm font-semibold text-slate-700 mb-2">كلمة المرور</label>
                <input type="password" name="password" required class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:border-indigo-500 text-right transition-colors" placeholder="••••••••" name = 'password'>
            </div>

            <div class="flex items-center justify-between text-sm">
                <label class="flex items-center text-slate-600 cursor-pointer">
                    <input type="checkbox" class="rounded text-indigo-600 focus:ring-indigo-500 ml-2">
                    تذكرني على هذا الجهاز
                </label>
            </div>

            <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 px-4 rounded-xl transition-all shadow-lg shadow-indigo-100 transform hover:-translate-y-0.5">
                تسجيل الدخول
            </button>
        </form>
    </div>

</body>
</html>
